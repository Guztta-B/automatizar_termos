<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="https://kit.fontawesome.com/5e9b2971de.js" crossorigin="anonymous"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Desk - TERMOS</title>
<link rel="icon" href="img/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

  <img src="img/Logo-BancoPine.png" alt="logo" class="imglogo">

  <h1>SERVICE DESK - TERMOS</h1>

  <div class="formulario">

<div class="input-box">

    <i class="fa-solid fa-calendar-days"></i>

    <input type="date" id="data">

</div>

<div class="input-box">

    <i class="fa-solid fa-user"></i>

    <input type="text" id="nome" placeholder="Nome">

</div>


<div class="input-box">

    <i class="fa-solid fa-id-card"></i>

    <input type="text" id="cpf" placeholder="CPF">

</div>



<div class="input-box">

    <i class="fa-solid fa-laptop"></i>

    <input type="text" id="snote" placeholder="SN Notebook">

</div>


<div class="input-box">
  
    <i class="fa-solid fa-computer-mouse"></i>

    <input type="text" id="snmouse" placeholder="SN Mouse">

</div>

<div class="toggle-group">
    <input type="radio" name="recebe_mouse" id="mouse_sim" value="sim" />
    <label for="mouse_sim">Sim</label>

    <input type="radio" name="recebe_mouse" id="mouse_nao" value="nao" />
    <label for="mouse_nao">Não</label>
  </div>





<div class="input-box">

    <i class="fa-solid fa-keyboard"></i>

    <input type="text" id="snteclado" placeholder="SN Teclado">

</div>





<!-- SELECIONAR SE VAI OU NAO OS EQUIPAMENTOS -->
 <div class="toggle-group">
    <input type="radio" name="recebe_teclado" id="teclado_sim" value="sim" />
    <label for="teclado_sim">Sim</label>

    <input type="radio" name="recebe_teclado" id="teclado_nao" value="nao" />
    <label for="teclado_nao">Não</label>
  </div>

<div class="input-box">

    <i class="fa-solid fa-headset"></i>

    <input type="text" id="snheadset" placeholder="SN Headset">

</div>

<div class="toggle-group" id="headset_simounao">
    <input type="radio" name="recebe_headset" id="headset_sim" value="sim" />
    <label for="headset_sim">Sim</label>

<input type="radio" name="recebe_headset" id="headset_nao" value="nao" />
    <label for="headset_nao">Não</label>

</div>


<div class="input-box">

<i class="fa-solid fa-desktop"></i>

    <input type="text" id="smonitor" placeholder="SN Monitor">

</div>


 <div class="toggle-group">
    <input type="radio" name="recebe_monitor" id="monitor_sim" value="sim" />
    <label for="monitor_sim">Sim</label>

    <input type="radio" name="recebe_monitor" id="monitor_nao" value="nao" />
    <label for="monitor_nao">Não</label>
  </div>


<div class="checkbox-box">

    <input type="checkbox" id="enviarEmail">

    <label for="enviarEmail">
        Enviar cópia por e-mail
    </label>

</div>

<!-- EMAIL COLABORADOR -->
<div class="input-box email-hidden" id="boxEmail">

    <i class="fa-solid fa-envelope"></i>

    <input
        type="email"
        id="emailColaborador"
        placeholder="E-mail do colaborador">

</div>

<!-- EMAIL RESPONSÁVEL -->
<div class="input-box email-hidden" id="boxEmailResponsavel">

    <i class="fa-solid fa-envelope"></i>

    <input
        type="email"
        id="emailResponsavel"
        placeholder="E-mail do responsável pela admissão">

</div>
   
    <button onclick="gerarPDF()">
     <i class="fa-solid fa-file-pdf"></i>

      Gerar PDF
      
    </button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
